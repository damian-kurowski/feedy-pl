server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy public XML feeds to backend
    location /feed/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dynamic sitemap from backend (lists all blog posts + landing pages from DB)
    location = /sitemap.xml {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Dynamic blog posts from DB → backend renders SEO HTML
    # Excludes the 3 prerendered legacy slugs which are caught by try_files first.
    location ~ ^/blog/[^/]+$ {
        try_files $uri.html @backend_html;
    }

    # User landing pages (always dynamic)
    location ~ ^/p/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Asset files — never fall back to index.html
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Index html — never cache (so prerendered content updates immediately)
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Generic SPA + prerender fallback:
    # 1. Exact file (e.g. /favicon.svg)
    # 2. Same path with .html (e.g. /feed-ceneo → /feed-ceneo.html — prerendered)
    # 3. As directory with index.html (e.g. /oferty/ → /oferty/index.html)
    # 4. SPA fallback to /index.html
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Backend fallback for dynamic HTML (blog posts not prerendered)
    location @backend_html {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
