        <h1>Feedy — Zarządzaj feedami produktowymi z jednego miejsca</h1>
        <p>Narzędzie do zarządzania feedami produktowymi dla e-commerce. Pobieraj XML z dowolnego sklepu, transformuj i generuj feedy dla Ceneo, Google Merchant Center, Allegro i innych porównywarek.</p>

        <h2>Jak to działa</h2>
        <ol>
          <li><strong>Wklej link do XML</strong> — Skopiuj URL feeda z panelu sklepu (Shoper, WooCommerce, PrestaShop, Magento, Shopify). System automatycznie pobierze i przeanalizuje wszystkie produkty.</li>
          <li><strong>Wybierz porównywarkę</strong> — Ceneo, Google Merchant Center, Allegro, Skąpiec, Facebook Catalog, Domodi — kliknij szablon i pola zmapują się automatycznie.</li>
          <li><strong>Gotowy link XML</strong> — Skopiuj link i wklej w panelu porównywarki. Feed odświeża się automatycznie.</li>
        </ol>

        <h2>Funkcje</h2>
        <ul>
          <li>Parsowanie dowolnego XML — obsługujemy Shoper, WooCommerce, PrestaShop, Magento, Shopify</li>
          <li>Szablony dla Ceneo, Google Merchant Center, Allegro, Skąpiec, Facebook Catalog, Domodi</li>
          <li>Automatyczne odświeżanie feedów co 1h, 6h lub 24h</li>
          <li>Reguły filtrowania i modyfikacji produktów</li>
          <li>Walidacja feedu przed wysłaniem do porównywarki</li>
          <li>Quality Score — wskaźnik jakości feedu z podziałem na błędy i ostrzeżenia</li>
          <li>AI optymalizacja tytułów i opisów produktów</li>
          <li>Mapowanie kategorii z taksonomią Google</li>
          <li>Upload i hosting zdjęć produktowych</li>
          <li>Historia zmian feedu (changelog)</li>
          <li>Override wartości per produkt w feedzie wyjściowym</li>
          <li>Custom value mapping (mapy wartości definiowane przez użytkownika)</li>
        </ul>

        <h2>Obsługiwane platformy e-commerce</h2>
        <p>Shoper, WooCommerce, PrestaShop, Magento, Shopify — i każdy inny sklep, który generuje XML z produktami.</p>

        <h2>Obsługiwane porównywarki i marketplace</h2>
        <p>Ceneo, Google Shopping (Merchant Center), Allegro, Skąpiec, Facebook Catalog (Meta Commerce), Domodi, Homebook — i dowolna inna poprzez Custom XML.</p>

        <h2>Cennik</h2>
        <ul>
          <li><strong>Free</strong> — 0 zł/mies. — 200 produktów, 1 feed wyjściowy, wszystkie szablony. Bez karty kredytowej, na zawsze.</li>
          <li><strong>Starter</strong> — 49 zł/mies. — 1 000 produktów, 3 feedy wyjściowe, auto-refresh.</li>
          <li><strong>Pro</strong> — 149 zł/mies. — 10 000 produktów, 10 feedów wyjściowych, reguły + AI opisy, walidacja feedów.</li>
          <li><strong>Business</strong> — 349 zł/mies. — 50 000 produktów, bez limitu feedów, white-label, multi-user / organizacje.</li>
        </ul>

        <h2>Dlaczego Feedy?</h2>
        <ul>
          <li>Cena od 29 zł/mies. — DataFeedWatch kosztuje ~280 zł, Channable ~260 zł za 1000 produktów</li>
          <li>Wszystkie porównywarki w cenie planu — bez dodatkowych opłat za kanały</li>
          <li>Interfejs po polsku — stworzony dla polskich sklepów</li>
          <li>Darmowy plan bez limitu czasowego</li>
        </ul>

        <h2>Często zadawane pytania</h2>
        <h3>Czy Feedy działa z moim sklepem?</h3>
        <p>Feedy działa z każdym sklepem, który generuje XML z produktami — Shoper, WooCommerce, PrestaShop, Magento, Shopify i inne. Wystarczy wkleić link do XML.</p>
        <h3>Jak szybko feed się odświeża?</h3>
        <p>Możesz ustawić automatyczne odświeżanie co 1, 6 lub 24 godziny. Feed jest zawsze aktualny — ceny i dostępność synchronizują się automatycznie.</p>
        <h3>Czy mogę przetestować za darmo?</h3>
        <p>Tak! Plan Free pozwala na 200 produktów i 1 feed wyjściowy — bez karty kredytowej, bez limitu czasowego. Możesz używać tak długo jak chcesz.</p>
        <h3>Ile kosztuje obsługa wielu porównywarek?</h3>
        <p>Nic dodatkowego! W przeciwieństwie do konkurencji, u nas wszystkie porównywarki są w cenie planu. Nie doliczamy za dodatkowe kanały.</p>
